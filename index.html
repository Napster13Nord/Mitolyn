<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mitolyn - Unlock Your Metabolic Power</title>
    <!-- Preconnect to fonts for faster load -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Preload LCP Image with High Priority -->
    <link rel="preload" href="Thumbnail.webp" as="image" fetchpriority="high">

    <!-- Deferred Google Fonts Loading -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap"></noscript>
    
    <!-- Inlined Critical CSS -->
    <style>
        :root {
            --primary-blue: #0070bc;
            --dark-blue: #004a80;
            --primary-orange: #ff9900;
            --dark-orange: #e68a00;
            --text-color: #333333;
            --bg-color: #f4f6f9;
            --white: #ffffff;
            --red-warning: #d32f2f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            color: var(--text-color);
            background-color: var(--bg-color);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: var(--white);
            min-height: 100vh;
            box-shadow: 0 0 30px rgba(0,0,0,0.1);
        }

        main { padding: 20px 15px; }

        .warning-banner {
            background-color: #fff4f4;
            color: var(--red-warning);
            padding: 12px;
            border-radius: 6px;
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            border: 1px dashed #ffcdd2;
        }

        .warning-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .warning-text {
            color: #d32f2f;
        }

        .warning-banner strong { font-weight: 800; }

        .pulse {
            width: 10px; height: 10px;
            background-color: var(--red-warning);
            border-radius: 50%;
            animation: pulsate 1.5s infinite ease-out;
        }

        @keyframes pulsate {
            0% { box-shadow: 0 0 0 0 rgba(211, 47, 47, 0.7); }
            70% { box-shadow: 0 0 0 8px rgba(211, 47, 47, 0); }
            100% { box-shadow: 0 0 0 0 rgba(211, 47, 47, 0); }
        }

        .headline {
            font-weight: 800;
            font-size: 1.6rem;
            text-align: center;
            color: var(--dark-blue);
            margin-bottom: 25px;
            line-height: 1.25;
        }

        .headline span {
            color: var(--primary-orange);
            display: block;
            margin-top: 5px;
        }

        .video-container {
            display: block; text-decoration: none; margin-bottom: 20px;
            text-align: center; -webkit-tap-highlight-color: transparent;
        }

        .video-thumbnail {
            position: relative; width: 100%;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            background: url('Thumbnail.webp') no-repeat center top;
            background-size: cover; border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15); overflow: hidden;
            border: 4px solid var(--primary-blue);
            transition: transform 0.2s ease;
        }

        .video-thumbnail::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 58, 112, 0.2);
        }

        .video-container:active .video-thumbnail { transform: scale(0.98); }

        .play-button {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); width: 75px; height: 75px;
            background-color: var(--primary-orange); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            z-index: 2; box-shadow: 0 6px 15px rgba(0,0,0,0.3); border: 4px solid #fff;
            animation: play-pulse 2s infinite;
        }

        .play-triangle {
            width: 0; height: 0; border-top: 14px solid transparent;
            border-bottom: 14px solid transparent; border-left: 22px solid #fff;
            margin-left: 8px;
        }

        @keyframes play-pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 153, 0, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255, 153, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 153, 0, 0); }
        }

        .click-to-watch {
            font-weight: 700; color: var(--primary-blue);
            margin-top: 15px; font-size: 1.15rem; display: flex;
            align-items: center; justify-content: center; gap: 6px;
        }

        .chevron { animation: bounceRight 1.5s infinite; }

        @keyframes bounceRight {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(5px); }
        }

        .urgency { text-align: center; margin: 30px 0 20px; }

        .urgency p {
            font-size: 0.95rem; color: #666; font-weight: 600; margin-bottom: 5px;
        }

        .countdown {
            font-size: 2.2rem; font-weight: 800; color: var(--red-warning);
            font-family: monospace; letter-spacing: 2px; background: #fff4f4;
            display: inline-block; padding: 5px 15px; border-radius: 8px; border: 2px solid #ffcdd2;
        }

        .cta-button {
            display: block; width: 100%;
            background: linear-gradient(180deg, #ffb732 0%, var(--primary-orange) 100%);
            color: #fff; text-align: center; padding: 20px; border-radius: 10px;
            text-decoration: none; font-weight: 800; font-size: 1.4rem;
            box-shadow: 0 8px 20px rgba(255, 153, 0, 0.4); margin-bottom: 35px;
            transition: all 0.2s ease; line-height: 1.2; border: 1px solid #e18700;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2); -webkit-tap-highlight-color: transparent;
        }

        .cta-button small {
            font-size: 0.9rem; font-weight: 600; opacity: 0.95;
            text-transform: uppercase; display: block; margin-top: 5px;
        }

        .cta-button:active {
            transform: scale(0.97) translateY(4px); box-shadow: 0 4px 10px rgba(255, 153, 0, 0.4);
        }

        .pulse-button { animation: cta-pulse 2s infinite; }

        @keyframes cta-pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        @media (max-width: 480px) {
            .headline { font-size: 1.4rem; }
            .cta-button { font-size: 1.2rem; padding: 10px; }
            .countdown { font-size: 1.8rem; }
        }
    </style>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DJCLQERWVY"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-DJCLQERWVY');
    </script>
</head>
<body>
    <div class="container">
        <!-- Main Content -->
        <main>
            <!-- Urgency/Warning Banner -->
            <div class="warning-banner">
                <div class="warning-header">
                    <span class="pulse"></span> <strong>WARNING:</strong>
                </div>
                <div class="warning-text">
                    Video may be taken down on <br><strong id="current-date">...</strong>
                </div>
            </div>

            <!-- Curiosity-driven Headline -->
            <h2 class="headline">Discover The 10-Second Morning Ritual That Unlocks Your <span>Metabolic Power</span></h2>

            <!-- Video Thumbnail CTA -->
            <a href="https://19cc3iljq0a50vfejdyb3efw4d.hop.clickbank.net" class="video-container" id="video-cta-link">
                <!-- Using the screenshot as the video thumbnail background -->
                <div class="video-thumbnail">
                    <div class="play-button">
                        <div class="play-triangle"></div>
                    </div>
                </div>
                <!-- Animated click indicator -->
                <p class="click-to-watch">
                    Tap to watch the video
                    <svg class="chevron" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
                </p>
            </a>

            <!-- Countdown Timer -->
            <div class="urgency">
                <p>Free presentation available for:</p>
                <div class="countdown" id="countdown">15:00</div>
            </div>

            <!-- Main CTA Button -->
            <a href="https://19cc3iljq0a50vfejdyb3efw4d.hop.clickbank.net" class="cta-button pulse-button" id="cta-button">
                WATCH THE PRESENTATION NOW <br><small>Click Here</small>
            </a>

        </main>
    </div>

    <!-- Inlined Script Logic -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const setDynamicDates = () => {
                const dateElement = document.getElementById("current-date");
                if (dateElement) {
                    const today = new Date();
                    const options = { month: 'long', day: 'numeric', year: 'numeric' };
                    dateElement.textContent = today.toLocaleDateString('en-US', options);
                }
            };
            setDynamicDates();

            let timeInSeconds = 15 * 60;
            const countdownElement = document.getElementById("countdown");

            if (countdownElement) {
                const savedTime = sessionStorage.getItem('mitolynCountdownTime');
                if (savedTime && !isNaN(savedTime) && savedTime > 0) {
                    timeInSeconds = parseInt(savedTime, 10);
                }

                const updateCountdown = () => {
                    const minutes = Math.floor(timeInSeconds / 60);
                    let seconds = timeInSeconds % 60;
                    const formattedMin = minutes < 10 ? "0" + minutes : minutes;
                    const formattedSec = seconds < 10 ? "0" + seconds : seconds;

                    countdownElement.textContent = `${formattedMin}:${formattedSec}`;

                    if (timeInSeconds > 0) {
                        timeInSeconds--;
                        sessionStorage.setItem('mitolynCountdownTime', timeInSeconds);
                    } else {
                        countdownElement.textContent = "00:00";
                    }
                };
                updateCountdown();
                setInterval(updateCountdown, 1000);
            }
            
            const attachTouchEffects = (selectors) => {
                selectors.forEach(selector => {
                    const el = document.querySelector(selector);
                    if (el) {
                        el.addEventListener('touchstart', () => {
                            el.style.transform = 'scale(0.97)'; el.style.transition = 'transform 0.1s';
                        }, { passive: true });
                        el.addEventListener('touchend', () => { el.style.transform = ''; }, { passive: true });
                        el.addEventListener('touchcancel', () => { el.style.transform = ''; }, { passive: true });
                    }
                });
            };
            attachTouchEffects(['#video-cta-link', '#cta-button']);
            
            const appendTrackingParams = () => {
                const urlParams = new URLSearchParams(window.location.search);
                const tid = urlParams.get('tid') || 'tiktok_organic'; 
                const links = document.querySelectorAll('a[href*="hop.clickbank.net"]');
                links.forEach(link => {
                    try {
                        const url = new URL(link.href);
                        if(!url.searchParams.has('tid')) { url.searchParams.append('tid', tid); }
                        link.href = url.toString();
                    } catch (e) {
                        console.error("Invalid URL format in href", e);
                    }
                });
            };
            appendTrackingParams();
        });
    </script>
</body>
</html>
